<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./images/web-icon.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="form.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CreamyBliss</title>
</head>

<body>
    <!-- navbar  -->
    <nav class="fixed w-full z-20 top-0 start-0 border-default nav">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="./index.html" class="flex title-font font-medium items-center logo">
                <img class="logo-img" src="./images/logo-img.png" alt="">
                <span class=" ml-3 text-4xl text-white web-logo">CreamyBliss</span>
            </a>
            <div class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
                <button type="button"
                    class="text-pink-400 bg-white hover:bg-brand-strong shadow-xs font-medium rounded-base leading-5 px-3 py-2 order-btn ">Order
                    Now</button>
                <button data-collapse-toggle="navbar-sticky" type="button"
                    class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading "
                    aria-controls="navbar-sticky" aria-expanded="false">
                    <span class="sr-only">Open main menu</span>
                    <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-width="2"
                            d="M5 7h14M5 12h14M5 17h14" />
                    </svg>
                </button>
            </div>
            <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1 nav-links"
                id="navbar-sticky">
                <ul
                    class="flex flex-col p-4 md:p-0 mt-4 font-medium border border-default rounded-base bg-neutral-secondary-soft md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-neutral-primary">
                    <li>
                        <a href="#ourproducts" class="block py-2 md:py-0 md:mr-5 text-lg text-white font-bold">Our
                            Products</a>
                    </li>
                    <li>
                        <a href="#sortoficecream" class="block py-2 md:py-0 md:mr-5 text-lg text-white font-bold">Sort
                            Of
                            Ice-Cream</a>
                    </li>
                    <li>
                        <a href="#aboutus" class="block py-2 md:py-0 md:mr-5 text-lg text-white font-bold">About
                            Us</a>
                    </li>
                    <li>
                        <a href="#gallery" class="block py-2 md:py-0 md:mr-5 text-lg text-white font-bold">Gallery</a>
                    </li>
                    <li>
                        <a href="#contactus" class="block py-2 md:py-0 md:mr-5 text-lg text-white font-bold">Contact
                            Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- navbar end  -->
    <!-- order card  -->
    <section class="text-gray-600 body-font overflow-hidden py-15">
        <form action="">
            <div class="container px-5 py-22 mx-auto">
                <div class="lg:w-4/5 mx-auto flex flex-wrap bg-gray-100 card">
                    <img alt="" class="lg:w-1/2 w-full lg:h-auto h-64 object-cover object-center rounded product "
                        src="./images/icecream6.png">
                    <div
                        class="lg:w-1/3 md:w-1/2 flex flex-col md:ml-auto w-full md:py-8 mt-8 md:mt-0 me-20 bg-gray-100">
                        <h2 class="text-pink-500 text-3xl font-bold title-font">Pistachio Ice-Cream</h2>
                        <div class="flex p-3">
                            <p class="text-pink- font-bold text-xl py-5">$8.99</p>
                            <label for="quantity"
                                class=" text-lg text-pink text-md font-medium mb-1 tracking-wide qnt">Quantity :</label>
                            <input id="quantity" type="number" value="1" min="1"
                                class="w-15 h-10 text-gray-500 text-center text-lg rounded border border-gray-300 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition-colors duration-200 ease-in-out py-2 qnt-box">
                        </div>
                        <div class="relative mb-4 ">
                            <input type="text" id="name" placeholder="Name"
                                class="w-full bg-gray-100 tracking-widest rounded-none border-0 border-b-2 border-pink-300 text-base outline-none text-gray-700 py-1 px-3 leading-8">
                        </div>
                        <div class="relative mb-4">
                            <input type="email" id="email" placeholder="Email"
                                class="w-full bg-gray-100 tracking-widest rounded-none border-0 border-b-2 border-pink-300 text-base outline-none text-gray-700 py-1 px-3 leading-8">
                        </div>
                        <div class="relative mb-4">
                            <input type="tel" id="contact" placeholder="Phone Number"
                                class="w-full bg-gray-100 tracking-widest rounded-none border-0 border-b-2 border-pink-300 text-base outline-none text-gray-700 py-1 px-3 leading-8">
                        </div>

                        <div class="relative mb-4">
                            <input type="text" id="location" placeholder="Address"
                                class="w-full bg-gray-100 tracking-widest rounded-none border-0 border-b-2 border-pink-300 text-base outline-none text-gray-700 py-1 px-3 leading-8">
                        </div>

                        <div class="relative mb-4">
                            <label for="message" class="leading-7 tracking-widest text-lg text-gray-600">Special Instructions :</label>
                            <textarea id="message" name="message"
                                class="w-full bg-gray-100 tracking-widest rounded border border-gray-300 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 h-32 text-base outline-none text-gray-700 py-1 px-3 resize-none leading-6 transition-colors duration-200 ease-in-out"></textarea>
                        </div>

                        <div class="relative mb-7">
                            <label for="name" class="leading-7 tracking-widest text-lg text-gray-600">Payment Method :</label> <br>
                            <label class="px-2 text-md tracking-wide" for="name">Cash On Delivery</label>
                            <input type="radio" id="cash" name="name" class="radio-btn">

                            <label class="px-2 tracking-wide" for="name">Easypaisa</label>
                            <input type="radio" id="Easypaisa" name="name" class="radio-btn">

                            <label class="px-2 tracking-wide" for="name">Allied Bank</label>
                            <input type="radio" id="bank" name="name" class="radio-btn">
                        </div>
                        <button type="button"
                            class="text-white bg-pink-500 tracking-wide border-0 py-2 px-6 focus:outline-none rounded text-lg btn"
                            id="order">Complete Order</button>
                    </div>
                </div>
            </div>
        </form>
    </section>



    <script src="form.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

</body>

</html>
